<!-- COMPONENT: event-card -->
<!-- Event Card Template — used by events.js to render event cards dynamically -->
<!--
  Usage: Clone this template and fill in the data attributes and text content.
  Required data attributes:
    data-event-id   — unique slug
    data-category   — sabbat | esbat | study-circle | social | workshop | other
-->
<template id="event-card-template">
  <article class="event-card" role="listitem">
    <div class="event-card__date-badge" aria-hidden="true">
      <span class="event-card__month"></span>
      <span class="event-card__day"></span>
    </div>
    <div class="event-card__body">
      <span class="event-card__category-tag"></span>
      <h3 class="event-card__title"></h3>
      <p class="event-card__meta">
        <time class="event-card__time"></time>
        <span class="event-card__location"></span>
      </p>
      <p class="event-card__description"></p>
    </div>
    <div class="event-card__actions">
      <a
        href="#"
        class="btn btn--primary btn--sm event-card__rsvp-btn"
        target="_blank"
        rel="noopener noreferrer"
        >RSVP</a
      >
      <a href="#" class="btn btn--ghost btn--sm event-card__details-btn">Details</a>
    </div>
  </article>
</template>
