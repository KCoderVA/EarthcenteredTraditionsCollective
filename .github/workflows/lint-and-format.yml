name: Lint and Format Check

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true

      - name: Check Prettier formatting
        id: prettier
        run: npm run format:check
        continue-on-error: true

      - name: Run stylelint
        id: stylelint
        run: npm run stylelint
        continue-on-error: true

      - name: Post lint status comment
        uses: actions/github-script@v7
        with:
          script: |
            const eslintPassed = '${{ steps.eslint.outcome }}' === 'success';
            const prettierPassed = '${{ steps.prettier.outcome }}' === 'success';
            const stylelintPassed = '${{ steps.stylelint.outcome }}' === 'success';
            const allPassed = eslintPassed && prettierPassed && stylelintPassed;

            const icon = (passed) => passed ? '✅' : '❌';
            const body = `## Lint & Format Results

            | Check | Status |
            |-------|--------|
            | ESLint | ${icon(eslintPassed)} |
            | Prettier | ${icon(prettierPassed)} |
            | Stylelint | ${icon(stylelintPassed)} |

            ${allPassed
              ? '**All checks passed!** 🎉'
              : '**Some checks failed.** Please review the workflow logs and fix any issues before merging.'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if any check failed
        if: >
          steps.eslint.outcome == 'failure' ||
          steps.prettier.outcome == 'failure' ||
          steps.stylelint.outcome == 'failure'
        run: exit 1
