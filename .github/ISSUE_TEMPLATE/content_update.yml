name: Content Update
description: Request a change or addition to website content (text, images, events, documents, etc.).
title: "[Content]: "
labels:
  - content
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this form to request updates to website content such as event listings, page text, documents in the library, or other information that needs to be added, changed, or removed.

  - type: input
    id: page-section
    attributes:
      label: Page / Section
      description: Which page and section does this content update apply to?
      placeholder: "e.g. Events page > Upcoming Events section"
    validations:
      required: true

  - type: textarea
    id: current-content
    attributes:
      label: Current Content
      description: What does the current content say, or what is currently there? (Leave blank if adding new content.)
      placeholder: "Current text/content here..."
    validations:
      required: false

  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed Change
      description: What should the content say or include instead? Please be as specific as possible.
      placeholder: "Proposed new content here..."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Change
      description: Why does this content need to be updated?
      placeholder: "The information is outdated / A new event has been scheduled / A document has been revised..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgently does this content need to be updated?
      options:
        - Low — any time is fine
        - Medium — within the next week
        - High — within the next 1-2 days
        - Urgent — ASAP (e.g. time-sensitive event info)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any attachments, links, or other information to support this request.
      placeholder: "Additional details, links to documents, images, etc."
    validations:
      required: false
